services:
  app:
    image: ghcr.io/avofl1ow/catty-reminders-app:${DEPLOY_REF:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER:-catty}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-cattypass}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-catty_reminders}
    volumes:
      - ./config.json:/catty-reminders-app/config.json:ro
    networks:
      - app-network

  db:
    container_name: catty-db
    image: mysql:8.0
    restart: unless-stopped  # ИСПРАВЛЕНО: Данила просил убрать always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-catty_reminders}
      MYSQL_USER: ${MYSQL_USER:-catty}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cattypass}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$MYSQL_USER -p$MYSQL_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
