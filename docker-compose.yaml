services:
  app:
    image: ${IMAGE:-ghcr.io/avofl1ow/catty-reminders-app:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8181:8181"
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=catty
      - MYSQL_PASSWORD=cattypass
      - MYSQL_DATABASE=catty_reminders
    volumes:
      - ./config.json:/catty-reminders-app/config.json:ro
    networks:
      - app-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: catty
      MYSQL_PASSWORD: cattypass
      MYSQL_DATABASE: catty_reminders
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ucatty -pcattypass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
