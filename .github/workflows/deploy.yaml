name: CD

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Собираем данные и приводим название репозитория к нижнему регистру
      - name: Get config details
        run: |
          echo "IMAGE_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE: ghcr.io/${{ env.IMAGE_LC }}:${{ env.COMMIT_SHA }}
          DEPLOY_REF: ${{ env.COMMIT_SHA }}
        with:
          host: "course.prafdin.ru"
          username: "kali"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3126
          envs: GITHUB_TOKEN,GITHUB_ACTOR,IMAGE,DEPLOY_REF
          script: |
            cd /home/kali/catty-reminders-app
            git fetch origin
            git checkout -f lab3
            git reset --hard origin/lab3
            bash scripts/deploy.sh
