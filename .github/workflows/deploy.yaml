name: Deploy
on:
  push:
    branches: [ lab4* ]
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: kali
          port: 3126
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              set -e
              cd /home/kali/catty-reminders-app
              
              git fetch origin
              git checkout lab4
              git pull origin lab4 || true
              
              OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
              
              # Формируем окружение под твою эталонную структуру данных
              sudo bash -c "cat << OUTEOF > .env
              IMAGE=ghcr.io/$OWNER/catty-reminders-app:${{ github.sha }}
              APP_CONTAINER_NAME=catty-app
              DB_CONTAINER_NAME=catty-db
              MARIADB_ROOT_PASSWORD=mypass
              MARIADB_PASSWORD=mypass
              MARIADB_USER=root
              MARIADB_DATABASE=catty_reminders
              HOST_DB_PORT=3306
              CONTAINER_DB_PORT=3306
              HOST_APP_PORT=8181
              CONTAINER_APP_PORT=8181
              OUTEOF"

              echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
              sudo docker compose down --remove-orphans || true
              sudo docker compose pull
              sudo docker compose up -d --force-recreate 
            '
