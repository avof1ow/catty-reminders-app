name: CD
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3126
          username: kali
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/kali/catty-reminders-app
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo env DEPLOY_REF=${{ github.sha }} docker compose pull app
            sudo env DEPLOY_REF=${{ github.sha }} docker compose down || true
            sudo env DEPLOY_REF=${{ github.sha }} docker compose up -d --remove-orphans
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8181/login >/dev/null; then exit 0; fi
              sleep 5
            done
            exit 1
