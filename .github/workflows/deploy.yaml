name: Deploy
on:
  release:
    types: [published]
  # Запускаем деплой на пуши, ТОЛЬКО когда воркфлоу CI полностью и успешно завершился
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [lab4*]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Защита: если это триггер от CI, выполняем деплой только при условии, что тесты и сборка прошли успешно
    if: ${{ github.event_name == 'release' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: kali
          port: 3126
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              set -e
              cd /home/kali/catty-reminders-app
              
              git fetch origin
              git checkout lab4
              git pull origin lab4 || true
              
              OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
              
              # Получаем SHA коммита динамически, в зависимости от того, как запустился деплой
              IF_WORKFLOW_SHA="${{ github.event.workflow_run.head_sha }}"
              CURRENT_SHA="${IF_WORKFLOW_SHA:-${{ github.sha }}}"
              
              # Формируем окружение (OUTEOF пишется строго с начала строки без пробелов)
              sudo bash -c "cat << OUTEOF > .env
IMAGE=ghcr.io/$OWNER/catty-reminders-app:$CURRENT_SHA
APP_CONTAINER_NAME=catty-app
DB_CONTAINER_NAME=catty-db
MARIADB_ROOT_PASSWORD=mypass
MARIADB_PASSWORD=mypass
MARIADB_USER=root
MARIADB_DATABASE=catty_reminders
HOST_DB_PORT=3306
CONTAINER_DB_PORT=3306
HOST_APP_PORT=8181
CONTAINER_APP_PORT=8181
OUTEOF"

              echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
              sudo docker compose down --remove-orphans || true
              sudo docker compose pull
              sudo docker compose up -d --force-recreate 
            '
