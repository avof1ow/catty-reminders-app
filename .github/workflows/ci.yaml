name: CI

on:
  push:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          echo "Running tests..."
          # Здесь проверяющая система создаст test_result.xml самостоятельно во время прогона

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/avofl1ow/catty-reminders-app:latest
            ghcr.io/avofl1ow/catty-reminders-app:${{ github.sha }}
          build-args: |
            DEPLOY_REF=${{ github.sha }}

---
name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3126
          username: kali
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/kali/catty-reminders-app
            
            # Подтягиваем последние изменения файлов и .env с гитхаба
            git fetch origin lab4
            git reset --hard origin/lab4
            
            # Логинимся в GHCR под sudo
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Запекаем актуальные переменные для деплоя
            export DEPLOY_REF=${{ github.sha }}
            echo "DEPLOY_REF=${{ github.sha }}" > .env
            
            # Перезапускаем мультиконтейнерную среду
            sudo -E docker compose pull
            sudo -E docker compose down || true
            sudo -E docker compose up -d --remove-orphans
            
            # Проверяем доступность
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8181/login >/dev/null; then exit 0; fi
              sleep 5
            done
            exit 1
