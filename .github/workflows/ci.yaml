name: CI Check
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --prefer-binary
          
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-v1-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-v1-
          
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps
        
      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Start application & Health Check
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8181 > uvicorn.log 2>&1 &
          
          for i in {1..15}; do
            if curl --fail --silent http://127.0.0.1:8181/login >/dev/null; then
              echo "Application started successfully!"
              exit 0
            fi
            sleep 1
          done
          echo "Application failed to start! Content of uvicorn.log:"
          cat uvicorn.log
          exit 1
          
      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest -v --browser chromium --junitxml=test_result.xml tests
          
      - name: Kill background application
        if: always()
        run: |
          pkill -f uvicorn || true
          sudo fuser -k 8181/tcp || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
